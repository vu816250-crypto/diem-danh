<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Điểm danh GPS</title>

<style>
  body {
    font-family: system-ui, sans-serif;
    background: linear-gradient(135deg, #111827, #1f2937);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    color: #fff;
  }

  .card {
    background: #0f172a;
    width: 100%;
    max-width: 420px;
    padding: 22px;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,.4);
  }

  h1 {
    text-align: center;
    margin: 0 0 6px;
  }

  .sub {
    text-align: center;
    font-size: 13px;
    color: #cbd5f5;
    margin-bottom: 18px;
  }

  input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
  }

  input {
    background: #020617;
    color: #fff;
    border: 1px solid #334155;
  }

  button {
    font-weight: bold;
    cursor: pointer;
  }

  .btn-main {
    background: #2563eb;
    color: white;
  }

  .btn-sub {
    background: #1e293b;
    color: #e5e7eb;
  }

  #output {
    margin-top: 14px;
    background: #020617;
    padding: 12px;
    border-radius: 10px;
    white-space: pre-line;
    font-size: 14px;
  }

  .footer {
    margin-top: 14px;
    font-size: 12px;
    text-align: center;
    color: #94a3b8;
  }
</style>
</head>

<body>
<div class="card">
  <h1>📍 ĐIỂM DANH GPS</h1>
  <div class="sub">Mỗi ngày mỗi máy chỉ điểm danh 1 lần</div>

  <input id="name" placeholder="Nhập họ và tên">

  <button class="btn-main" onclick="checkIn()">📍 Điểm danh</button>
  <button class="btn-sub" onclick="showList()">📋 Xem danh sách</button>
  <button class="btn-sub" onclick="exportCSV()">⬇️ Xuất danh sách (Excel)</button>

  <div id="output"></div>

  <div class="footer">Attendance GPS System</div>
</div>

<script>
  // 🔧 CHẾ ĐỘ BẢO TRÌ (BẬT / TẮT)
const MAINTENANCE_MODE = false; // true = nghỉ Tết | false = hoạt động
const MAINTENANCE_MSG =
  "🧧 ADMIN ĐI ĂN TẾT RỒI 🎉\n" +
  "Hệ thống điểm danh tạm nghỉ.\n" +
  "Hẹn gặp lại sau Tết nha!";
/* ========== CẤU HÌNH ========== */
// 📍 Toạ độ lớp (SỬA)
const TARGET_LAT = 16.459627;
const TARGET_LNG = 107.592789;

// 📏 Bán kính cho phép (m)
const ALLOW_RADIUS = 150;

// ⏰ GIỜ + PHÚT ĐIỂM DANH (CHỈ CẦN CHỈNH CHỖ NÀY)
const START_HOUR = 7 ;
const START_MIN  = 0;

const END_HOUR   = 21;
const END_MIN    = 0;
/* ============================== */

/* ========= GOOGLE SHEET API ========= */
const API_URL = "https://script.google.com/macros/s/AKfycbyxOl9sZk9wN1_71w1K8feubNp40zULwyDctjL_E-td0eZ-iFT_Uwh0U2m2yZj6lAWt/exec";

function submitAttendance(data) {
  fetch(API_URL, {
    method: "POST",
    mode: "no-cors",   // 🔥 DÒNG QUYẾT ĐỊNH
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });
}
/* ============================ */
// 🔑 Key theo NGÀY (tự reset mỗi ngày)
const today = new Date().toLocaleTimeString("vi-VN", {
  hour: "2-digit",
  minute: "2-digit",
  second: "2-digit",
  hour12: false
})
const CHECK_KEY = "checked_in_" + today;
const LIST_KEY  = "attendance_list_" + today;

/* ===== KIỂM TRA THỜI GIAN ===== */
function isWithinTime() {
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const startMin = START_HOUR * 60 + START_MIN;
  const endMin = END_HOUR * 60 + END_MIN;
  return nowMin >= startMin && nowMin <= endMin;
}

/* ===== TÍNH KHOẢNG CÁCH ===== */
function calcDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a =
    Math.sin(dLat/2) ** 2 +
    Math.cos(toRad(lat1)) *
    Math.cos(toRad(lat2)) *
    Math.sin(dLon/2) ** 2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/* ===== LƯU DANH SÁCH ===== */
function saveAttendance(name, time, distance) {
  const list = JSON.parse(localStorage.getItem(LIST_KEY) || "[]");
  list.push({ name, time, distance });
  localStorage.setItem(LIST_KEY, JSON.stringify(list));
}

/* ===== ĐIỂM DANH ===== */
function checkIn() {
  const output = document.getElementById("output");
  const name = document.getElementById("name").value.trim();
  if (MAINTENANCE_MODE) {
    document.getElementById("output").textContent = MAINTENANCE_MSG;
    return;
  }

  if (!name) {
    output.textContent = "❌ Vui lòng nhập họ tên";
    return;
  }

  if (!isWithinTime()) {
    output.textContent = "⛔ Ngoài thời gian điểm danh";
    return;
  }

  if (localStorage.getItem(CHECK_KEY)) {
    output.textContent = "⚠️ Máy này đã điểm danh hôm nay";
    return;
  }

  if (!navigator.geolocation) {
    output.textContent = "❌ Trình duyệt không hỗ trợ GPS";
    return;
  }

  output.textContent = "⏳ Đang lấy vị trí...";

  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const acc = pos.coords.accuracy;

    const dist = calcDistance(lat, lng, TARGET_LAT, TARGET_LNG);
    const timeStr = new Date().toLocaleString("vi-VN");

    let text =
      `👤 ${name}\n` +
      `⏰ ${timeStr}\n` +
      `📏 ${dist.toFixed(1)} m\n` +
      `🎯 Accuracy: ${acc.toFixed(1)} m\n`;

   if (dist <= ALLOW_RADIUS) {
  text += "\n✅ ĐIỂM DANH THÀNH CÔNG";
  localStorage.setItem(CHECK_KEY, "1");
  saveAttendance(name, timeStr, dist.toFixed(1));

  // ✅ GỬI DỮ LIỆU LÊN GOOGLE SHEETS
  submitAttendance({
    name: name,
    time: timeStr,
    distance: dist.toFixed(1),
    lat: lat,
    lng: lng,
    accuracy: acc.toFixed(1)
  });

} else {
      text += "\n❌ Bạn không ở trong khu vực lớp";
    }

    output.textContent = text;
  }, () => {
    output.textContent = "❌ Không lấy được vị trí GPS";
  }, {
    enableHighAccuracy: true,
    timeout: 10000
  });
}

/* ===== XEM DANH SÁCH ===== */
function showList() {
  const list = JSON.parse(localStorage.getItem(LIST_KEY) || "[]");
  if (list.length === 0) {
    alert("❌ Chưa có ai điểm danh");
    return;
  }

  let text = "📋 DANH SÁCH ĐIỂM DANH\n\n";
  list.forEach((s, i) => {
    text += `${i+1}. ${s.name}\n⏰ ${s.time}\n📏 ${s.distance} m\n\n`;
  });

  alert(text);
}

/* ===== XUẤT CSV (EXCEL) ===== */
function exportCSV() {
  const list = JSON.parse(localStorage.getItem(LIST_KEY) || "[]");
  if (list.length === 0) {
    alert("❌ Không có dữ liệu để xuất");
    return;
  }

  let csv = "STT,Họ tên,Thời gian,Khoảng cách (m)\n";
  list.forEach((s, i) => {
    csv += `${i+1},"${s.name}","${s.time}",${s.distance}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = `diem_danh_${today}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
